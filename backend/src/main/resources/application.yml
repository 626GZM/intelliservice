server:
  port: 8080

spring:
  main:
    # 同时引入 webmvc + webflux 时强制使用 Servlet 模式
    web-application-type: servlet

  datasource:
    url: jdbc:mysql://localhost:3306/intelliservice?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: agent
    password: agent123
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.intelliservice.backend.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT 配置
jwt:
  secret: intelliservice-secret-key-2024-this-should-be-long-enough
  expiration: 86400000  # 24小时

# Agent 服务配置
agent:
  service:
    url: http://localhost:8001
deepseek:
  api-key: sk-e3cc6bb86eeb4b9198adc448579f76ef